<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Dungeon Delver</title>
    <!-- <link rel="icon" href="/favicon.ico" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" /> -->

    <link rel="stylesheet" href="css/app.css" />
  </head>

  <body>
    <h1>Dungeon Delver</h1>

    <div>
      <h2>Room types</h2>
      <div>
        <span>Trap room weight</span>
        <span id="room_types_trap_text">5</span>
        <input
          type="range"
          min="0"
          max="10"
          value="5"
          id="room_types_trap"
          onchange="updateSliderText(this.id+'_text', this.value)"
        />
      </div>
      <div>
        <span>Monster room weight</span>
        <span id="room_types_monster_text">5</span>
        <input
          type="range"
          min="0"
          max="10"
          value="5"
          id="room_types_monster"
          onchange="updateSliderText(this.id+'_text', this.value)"
        />
      </div>
      <div>
        <span>Empty room weight</span>
        <span id="room_types_empty_text">1</span>
        <input
          type="range"
          min="0"
          max="10"
          value="1"
          id="room_types_empty"
          onchange="updateSliderText(this.id+'_text', this.value)"
        />
      </div>
    </div>

    <div>
      <h2>Difficulty level</h2>
      <div>
        <span>Min level</span>
        <span id="min_level_text">1</span>
        <input
          type="range"
          min="1"
          max="5"
          value="1"
          id="min_level"
          onchange="updateSliderText(this.id+'_text', this.value)"
        />
      </div>

      <div>
        <span>Max level</span>
        <span id="max_level_text">2</span>
        <input
          type="range"
          min="1"
          max="5"
          value="2"
          id="max_level"
          onchange="updateSliderText(this.id+'_text', this.value)"
        />
      </div>
    </div>

    <div>
      <h2>Number of rooms</h2>
      <div>
        <span>Minimum rooms </span>
        <span id="min_rooms_text">5</span>
        <input
          type="range"
          min="1"
          max="30"
          value="5"
          id="min_rooms"
          onchange="updateSliderText(this.id+'_text', this.value)"
        />
      </div>

      <div>
        <span>Maximum rooms</span>
        <span id="max_rooms_text">10</span>
        <input
          type="range"
          min="1"
          max="30"
          value="10"
          id="max_rooms"
          onchange="updateSliderText(this.id+'_text', this.value)"
        />
      </div>
    </div>

    <h2>Your dungeon</h2>
    <button type="button" onclick="generate()">Generate</button>
    <button type="button" onclick="clearGenerated()">Clear</button>
    <div id="generated_content"></div>

    <!-- your content here... -->
    <script src="js/scripts.js"></script>
  </body>
</html>
